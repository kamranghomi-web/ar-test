<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room Visualizer</title>
<style>
  :root{
    --bg:#0e0d0b;
    --panel:#16140f;
    --line:#2a261d;
    --ink:#efe7d4;
    --muted:#9a907a;
    --accent:#c9a24b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Georgia',serif;
    overflow:hidden;
  }
  #stage{position:fixed;inset:0}
  canvas{display:block}

  #photo{
    position:fixed;inset:0;
    width:100%;height:100%;
    object-fit:contain;
    background:#000;
    z-index:0;
  }
  #stage{z-index:1}

  #panel{
    position:fixed;left:18px;top:18px;z-index:10;
    width:248px;
    background:rgba(22,20,15,.82);
    backdrop-filter:blur(8px);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
  }
  #panel h1{
    font-size:15px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);font-weight:normal;margin-bottom:4px;
  }
  #panel p.sub{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:system-ui}
  .row{margin-bottom:13px}
  .row label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:system-ui}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .file-btn{
    display:block;width:100%;text-align:center;
    padding:9px;border:1px dashed var(--line);border-radius:9px;
    color:var(--ink);font-size:12px;cursor:pointer;font-family:system-ui;
    transition:border-color .2s,background .2s;
  }
  .file-btn:hover{border-color:var(--accent);background:rgba(201,162,75,.07)}
  input[type=file]{display:none}
  .hint{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.5;font-family:system-ui}
  .val{float:right;color:var(--ink);font-family:system-ui}
</style>
</head>
<body>

<img id="photo" alt="">
<div id="stage"></div>

<div id="panel">
  <h1>Room Visualizer</h1>
  <p class="sub">Aks-e otaagh bede, model ro jaabejaa kon</p>

  <div class="row">
    <label for="file">Aks-e otaagh</label>
    <label class="file-btn" for="file">📷 Entekhab-e aks</label>
    <input id="file" type="file" accept="image/*">
  </div>

  <div class="row">
    <label>Andaaze <span class="val" id="vScale">100%</span></label>
    <input id="scale" type="range" min="10" max="300" value="100">
  </div>
  <div class="row">
    <label>Charkhesh <span class="val" id="vRot">0°</span></label>
    <input id="rot" type="range" min="0" max="360" value="0">
  </div>
  <div class="row">
    <label>Chap / Raast <span class="val" id="vX">0</span></label>
    <input id="posx" type="range" min="-100" max="100" value="0">
  </div>
  <div class="row">
    <label>Jolo / Aghab <span class="val" id="vZ">0</span></label>
    <input id="posz" type="range" min="-100" max="100" value="0">
  </div>

  <p class="hint">Maus: charkhesh-e view · Scroll: zoom · Slider-ha: jaabejaayi-e model</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const MODEL_URL = 'model.glb';   // hamoon glb-e khodet, kenare in file

const stage = document.getElementById('stage');

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 1.4, 4);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444433, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(3,5,2);
scene.add(dir);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,0.5,0);
controls.enableDamping = true;

let model = null;
const loader = new GLTFLoader();
loader.load(MODEL_URL, (gltf)=>{
  model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  const maxDim = Math.max(size.x,size.y,size.z);
  model.userData.base = 1.0/maxDim;
  model.userData.sitY = (size.y*(1.0/maxDim))/2;
  scene.add(model);
  applyTransform();
}, undefined, (err)=>{
  console.error('GLB load error:', err);
  alert('Model load nashod. Motma\'en sho model.glb kenare in file hast.');
});

const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
grid.material.opacity = 0.25; grid.material.transparent = true;
scene.add(grid);

const ui = {
  scale: document.getElementById('scale'),
  rot:   document.getElementById('rot'),
  posx:  document.getElementById('posx'),
  posz:  document.getElementById('posz'),
};
function applyTransform(){
  if(!model) return;
  const sc = (+ui.scale.value/100) * model.userData.base;
  model.scale.setScalar(sc);
  model.rotation.y = THREE.MathUtils.degToRad(+ui.rot.value);
  model.position.x = +ui.posx.value/40;
  model.position.z = +ui.posz.value/40;
  model.position.y = model.userData.sitY * (+ui.scale.value/100);
  document.getElementById('vScale').textContent = ui.scale.value+'%';
  document.getElementById('vRot').textContent = ui.rot.value+'°';
  document.getElementById('vX').textContent = ui.posx.value;
  document.getElementById('vZ').textContent = ui.posz.value;
}
Object.values(ui).forEach(el=>el.addEventListener('input', applyTransform));

document.getElementById('file').addEventListener('change',(e)=>{
  const f = e.target.files[0];
  if(!f) return;
  document.getElementById('photo').src = URL.createObjectURL(f);
});

addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function tick(){
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
