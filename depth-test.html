<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Depth Test</title>
<style>
  :root{
    --bg:#0e0d0b; --ink:#efe7d4; --muted:#9a907a;
    --line:#2a261d; --accent:#c9a24b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:system-ui,sans-serif;
    min-height:100vh;padding:24px;
  }
  h1{font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:4px}
  p.sub{font-size:12px;color:var(--muted);margin-bottom:20px}
  .file-btn{
    display:inline-block;padding:11px 18px;border:1px dashed var(--line);
    border-radius:10px;color:var(--ink);font-size:13px;cursor:pointer;
    transition:border-color .2s,background .2s;
  }
  .file-btn:hover{border-color:var(--accent);background:rgba(201,162,75,.07)}
  input[type=file]{display:none}
  #status{margin:18px 0;font-size:13px;color:var(--accent);min-height:20px}
  .grid{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px}
  .card{flex:1;min-width:280px}
  .card h2{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  canvas,img.preview{
    width:100%;border:1px solid var(--line);border-radius:10px;
    background:#000;display:block;
  }
</style>
</head>
<body>

<h1>Depth Anything Test</h1>
<p class="sub">Ye aks bede ta depth map besaazim (test-e marhaleye 1)</p>

<label class="file-btn" for="file">📷 Entekhab-e aks</label>
<input id="file" type="file" accept="image/*">

<div id="status">Amaade. Ye aks entekhab kon.</div>

<div class="grid">
  <div class="card">
    <h2>Aks-e asli</h2>
    <img id="orig" class="preview" alt="">
  </div>
  <div class="card">
    <h2>Depth map</h2>
    <canvas id="depthCanvas"></canvas>
  </div>
</div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2";

const statusEl = document.getElementById('status');
const orig = document.getElementById('orig');
const canvas = document.getElementById('depthCanvas');
const ctx = canvas.getContext('2d');

let estimator = null;

async function getEstimator(){
  if(estimator) return estimator;
  statusEl.textContent = '⏳ Model dare download/load mishe (bar-e avval taa ~1 daghighe)...';
  let device = 'wasm';
  if('gpu' in navigator){ device = 'webgpu'; }
  try{
    estimator = await pipeline('depth-estimation','onnx-community/depth-anything-v2-small',{ device });
  }catch(e){
    statusEl.textContent = 'WebGPU nashod, ba CPU edaame...';
    estimator = await pipeline('depth-estimation','onnx-community/depth-anything-v2-small',{ device:'wasm' });
  }
  return estimator;
}

document.getElementById('file').addEventListener('change', async (e)=>{
  const f = e.target.files[0];
  if(!f) return;
  const url = URL.createObjectURL(f);
  orig.src = url;

  try{
    const est = await getEstimator();
    statusEl.textContent = '⏳ Depth dare hesab mishe...';
    const out = await est(url);
    const depth = out.depth;
    canvas.width = depth.width;
    canvas.height = depth.height;
    const img = ctx.createImageData(depth.width, depth.height);
    const d = depth.data;
    for(let i=0;i<d.length;i++){
      const v = d[i];
      img.data[i*4+0]=v;
      img.data[i*4+1]=v;
      img.data[i*4+2]=v;
      img.data[i*4+3]=255;
    }
    ctx.putImageData(img,0,0);
    statusEl.textContent = '✅ Tamoom! (roshan = nazdik, tireh = door)';
  }catch(err){
    console.error(err);
    statusEl.textContent = '❌ Khata: '+err.message;
  }
});
</script>
</body>
</html>
