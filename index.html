<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOMOUD AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body{margin:0;background:#0e0d0b;font-family:system-ui,sans-serif}
    model-viewer{width:100vw;height:100vh;--poster-color:#0e0d0b}
    .ar-btn{
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      background:#c9a24b;color:#0e0d0b;border:none;border-radius:30px;
      padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;
      box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:10;
    }
  </style>
</head>
<body>

<model-viewer
  src="model.glb"
  ios-src="model.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="auto"
  camera-controls
  touch-action="pan-y"
  shadow-intensity="1"
  alt="3D model">
  <button slot="ar-button" class="ar-btn">📱 Moshahede dar AR</button>
</model-viewer>

</body>
</html>
